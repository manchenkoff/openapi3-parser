---
name: CI
on:
  pull_request:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Git
        uses: actions/checkout@v6
      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Run linters
        run: |
          uv run ruff check .
          uv run mypy .
          uv run ty check .
      - name: Run tests
        run: uv run pytest

