---
name: CI
on:
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"
          enable-cache: true
      - name: dependencies
        run: uv sync --locked --dev
      - name: ruff
        run: uv run ruff check .
      - name: mypy
        run: uv run mypy .
      - name: ty
        run: uv run ty check .
  test:
    name: test python ${{ matrix.python-version }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: dependencies
        run: uv sync --locked --dev
      - name: tests
        run: uv run pytest
